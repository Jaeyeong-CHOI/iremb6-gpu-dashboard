<!doctype html>
<html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iREMB GPU Dashboard</title>
<style>
:root{--bg:#f6f8fb;--card:#fff;--text:#191f28;--muted:#8b95a1;--line:#eef1f4;--blue:#3182f6;--ok:#16b364;--warn:#f79009;--bad:#f04438}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px 40px} h1{margin:0;font-size:30px;font-weight:800}.sub{margin-top:6px;color:var(--muted);font-size:14px}
.toolbar{display:flex;gap:10px;align-items:center;margin:14px 0 18px}.btn{border:0;background:var(--blue);color:#fff;padding:10px 14px;border-radius:12px;font-weight:700;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 24px rgba(17,24,39,.05)}
.node{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.node h3{margin:0;font-size:20px}.updated{color:var(--muted);font-size:12px}
.gpu{padding:12px 0;border-top:1px solid var(--line)}.gpu:first-of-type{border-top:0}.topline{display:flex;justify-content:space-between;align-items:center;gap:10px}
.gname{font-size:14px;font-weight:700;color:#333d4b}.util{font-weight:800}.ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)}
.meta{margin-top:6px;color:#6b7684;font-size:13px}.spark-wrap{margin-top:8px;background:#f8fbff;border:1px solid #e8eff9;border-radius:10px;padding:6px}
.spark{width:100%;height:42px;display:block}.spark path{stroke:#3182f6;stroke-width:2;fill:none}
</style></head>
<body><div class="wrap"><h1>LaMI LAB GPU Management</h1>
<div class="toolbar"></div><div class="grid" id="cards"></div></div>
<script>
const API_BASE = localStorage.getItem('gpu_api_base') || 'https://office-most-cartridge-broker.trycloudflare.com';
const NODES = ['iREMB-C-03','iREMB-C-07'];
const UI_TICK_MS = 500;      // 화면 갱신 tick
const API_COOLDOWN_MS = 500; // API 최소 호출 간격
let lastFetchAt = 0;
let fetchInFlight = false;
let cacheResults = [];

function usageClass(v){ if(v>=90) return 'bad'; if(v>=60) return 'warn'; return 'ok'; }
function sparkPath(values,w=300,h=42){ if(!values.length) return ''; const maxX=values.length-1||1; return values.map((v,i)=>{const x=(i/maxX)*w; const y=h-(Math.max(0,Math.min(100,v))/100)*h; return `${i===0?'M':'L'}${x.toFixed(2)},${y.toFixed(2)}`;}).join(' '); }
async function fetchNode(node){ const r=await fetch(`${API_BASE}/history?node=${encodeURIComponent(node)}`); if(!r.ok) throw new Error(`${node}: ${r.status}`); return await r.json(); }
function renderNode(node,data){
  const rows=(data.gpus||[]).map(g=>{ const util=Number(g.latest?.util||0); const memUsed=Number(g.latest?.mem_used||0); const memTotal=Number(g.latest?.mem_total||0); const arr=(g.points||[]).map(p=>Number(p.util||0)); const d=sparkPath(arr);
    return `<div class="gpu"><div class="topline"><div class="gname">GPU ${g.index} · ${g.name||'unknown'}</div><div class="util ${usageClass(util)}">${util}%</div></div><div class="spark-wrap"><svg class="spark" viewBox="0 0 300 42" preserveAspectRatio="none"><path d="${d}"></path></svg></div><div class="meta">메모리 ${memUsed} / ${memTotal} MiB</div></div>`; }).join('');
  return `<div class="card"><div class="node"><h3>${node}</h3><div class="updated">${new Date().toLocaleTimeString()}</div></div>${rows||'<div class="meta">데이터 없음</div>'}</div>`;
}
function renderFromCache(){
  const cards=document.getElementById('cards');
  if(!cacheResults.length) return;
  cards.innerHTML=cacheResults.map(x=>x.err
    ? `<div class="card"><div class="node"><h3>${x.n}</h3></div><div class="bad">오류: ${x.err}</div></div>`
    : renderNode(x.n,x.d)
  ).join('');
}

async function maybeFetch(){
  const now = Date.now();
  if(fetchInFlight) return;
  if(now - lastFetchAt < API_COOLDOWN_MS) return;
  fetchInFlight = true;
  try{
    const results=await Promise.all(NODES.map(n=>fetchNode(n).then(d=>({n,d})).catch(e=>({n,err:e.message}))));
    cacheResults = results;
    lastFetchAt = Date.now();
  } finally {
    fetchInFlight = false;
  }
}

async function tick(){
  await maybeFetch();
  renderFromCache();
}

tick();
setInterval(tick, UI_TICK_MS);
</script></body></html>
